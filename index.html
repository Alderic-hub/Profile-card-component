<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Profile card component</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
    <div id="bkg">
    <img id="top" src="images\bg-pattern-top.svg" alt="">
    <img id="bottom" src="images\bg-pattern-bottom.svg" alt="">
  </div>
  <main>
    <section id="pattern">
      <img src="images\bg-pattern-card.svg" alt="Marker with swirrle pattern of the card">
    </section>
    <section id="Img">
      <img src="images\image-victor.jpg" alt="A fair skined handsom African American male">
    </section>

    <section id="Info">
      <article id="Main">
        <span class="Name">Victor Crest</span>
        <span>26</span>
      </article>
      <article>
        London
      </article> 
    </section>

    <section id="Stats">

      <article>
        <span class="Name">80K</span>
        Followers
      </article>
      <article>
        <span class="Name">803K</span>
        Likes
      </article>
      <article>
        <span class="Name">1.4K</span>
        Photos
      </article>

    </section>

  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Aldric</a>.
  </div>
</body>
</html>
